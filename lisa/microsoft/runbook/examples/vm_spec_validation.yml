# VM Specification Validation Runbook
#
# This runbook provisions one Azure VM and validates that the guest
# matches the hardware specification published by the VM size's
# container policy (Azure SKU capabilities).
#
# No CSV file or per-spec runbook variables are needed - all expected
# values are read from the platform's capability map at runtime.
#
# Usage:
#   lisa -r lisa/microsoft/runbook/examples/vm_spec_validation.yml \
#        --variable "subscription_id:<your_sub_id>" \
#        --variable "vm_size:<vm_size_to_validate>"

name: vm_spec_validation

include:
  - path: ../azure.yml

extension:
  - ../../testsuites

variable:
  - name: vm_size
    value: ""
  - name: location
    value: "westus2"
  - name: marketplace_image
    value: "Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest"
  - name: test_pass
    value: "adhoc"
  - name: keep_environment
    value: "no"
  - name: subscription_id
    value: ""

# Select only the vm_spec_validation test cases
testcase:
  - criteria:
      area: vm_spec_validation
      name: ""
