name: sample-test-run
concurrency: 1

extension:
  - "../../lisa/microsoft/testsuites"

platform:
  - type: azure
    admin_username: "$(admin_username)"
    admin_private_key_file: "$(admin_private_key_file)"
    keep_environment: no
    azure:
      subscription_id: "$(subscription_id)"
      deploy_location: "westus2"
      marketplace:
        publisher: canonical
        offer: 0001-com-ubuntu-server-jammy
        sku: 22_04-lts-gen2
        version: latest

variable:
  - name: admin_username
    value: ""
  - name: admin_private_key_file
    value: ""
  - name: subscription_id
    value: ""
    is_secret: true

notifier:
  - type: console
  - type: html

testcase:
  - criteria:
      area: provisioning
      priority: [0, 1]
